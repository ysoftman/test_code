<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>test_web_page</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --card: #1a1d23;
        --border: #2a2e36;
        --fg: #e6e6e6;
        --muted: #9aa0aa;
        --accent: #6ea8fe;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.6;
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      h1 {
        font-size: 2rem;
        margin: 0 0 4px;
      }
      .sub {
        color: var(--muted);
        margin: 0 0 32px;
      }
      .grid {
        display: grid;
        gap: 28px;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      }
      a.card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        transition:
          border-color 0.15s,
          transform 0.15s;
      }
      a.card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      a.card h2 {
        margin: 0 0 6px;
        font-size: 1.1rem;
      }
      a.card p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }
      footer {
        margin-top: 40px;
        color: var(--muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>test_web_page</h1>
      <p class="sub">웹 관련 테스트 요소 모음 · GitHub Pages</p>

      <!-- 새 테스트 요소를 추가하면 아래 grid 에 카드 하나를 더합니다. -->
      <div class="grid">
        <a class="card" href="./css-framework-comparison/">
          <h2>CSS Framework Comparison</h2>
          <p>MUI · Tailwind · Panda CSS 등 스타일링 솔루션 비교</p>
        </a>
        <a class="card" href="./ysoftman-project/">
          <h2>ysoftman-project</h2>
          <p>Vue 3 · Vuetify · Vue Router · Pinia 테스트 앱</p>
        </a>
        <a class="card" href="./ysoftman-react-app/">
          <h2>ysoftman-react-app</h2>
          <p>React 19 · Create React App 테스트 앱</p>
        </a>
      </div>

      <footer>
        Source:
        <a
          href="https://github.com/ysoftman/test_code/tree/main/test_web_page"
          style="color: var(--accent)"
          >github.com/ysoftman/test_code</a
        >
      </footer>
    </div>
  </body>
</html>
