name: Deploy test_web_page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "test_web_page/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: test_web_page/css-framework-comparison
        run: bun install

      - name: Build all framework apps
        working-directory: test_web_page/css-framework-comparison
        run: bun run build:all

      - name: Install vue-sample dependencies
        working-directory: test_web_page/vue-sample
        run: bun install

      - name: Build vue-sample
        working-directory: test_web_page/vue-sample
        run: bun run build

      - name: Install react-sample dependencies
        working-directory: test_web_page/react-sample
        run: bun install

      - name: Build react-sample
        working-directory: test_web_page/react-sample
        run: bun run build

      - name: Install particle dependencies
        working-directory: test_web_page/particle
        run: bun install

      - name: Build particle
        working-directory: test_web_page/particle
        run: bun run build

      - name: Install tsparticles dependencies
        working-directory: test_web_page/tsparticles
        run: bun install

      - name: Build tsparticles
        working-directory: test_web_page/tsparticles
        run: bun run build

      - name: Assemble _site
        run: |
          set -euo pipefail
          SRC=test_web_page
          OUT=_site

          # 1) static landing pages
          mkdir -p "$OUT/css-framework-comparison"
          cp "$SRC/index.html" "$OUT/index.html"
          cp "$SRC/css-framework-comparison/index.html" "$OUT/css-framework-comparison/index.html"

          # 2) each framework app that produced a dist
          for dir in "$SRC"/css-framework-comparison/*/; do
            app=$(basename "$dir")
            if [ -d "$dir/dist" ]; then
              echo "include built app: $app"
              mkdir -p "$OUT/css-framework-comparison/$app"
              cp -r "$dir/dist/." "$OUT/css-framework-comparison/$app/"
            fi
          done

          # 2b) vue-sample (Vue + Vuetify SPA)
          if [ -d "$SRC/vue-sample/dist" ]; then
            echo "include built app: vue-sample"
            mkdir -p "$OUT/vue-sample"
            cp -r "$SRC/vue-sample/dist/." "$OUT/vue-sample/"
            # SPA(history mode) 새로고침/딥링크 대비 404 fallback
            cp "$OUT/vue-sample/index.html" "$OUT/vue-sample/404.html"
          fi

          # 2c) react-sample (CRA, build/ 출력)
          if [ -d "$SRC/react-sample/build" ]; then
            echo "include built app: react-sample"
            mkdir -p "$OUT/react-sample"
            cp -r "$SRC/react-sample/build/." "$OUT/react-sample/"
          fi

          # 2d) particle (PixiJS + Matter.js 게임)
          if [ -d "$SRC/particle/dist" ]; then
            echo "include built app: particle"
            mkdir -p "$OUT/particle"
            cp -r "$SRC/particle/dist/." "$OUT/particle/"
          fi

          # 2e) tsparticles (tsParticles 프리셋 예시)
          if [ -d "$SRC/tsparticles/dist" ]; then
            echo "include built app: tsparticles"
            mkdir -p "$OUT/tsparticles"
            cp -r "$SRC/tsparticles/dist/." "$OUT/tsparticles/"
          fi

          # 3) build info (배포 날짜 / 커밋 버전) — 랜딩 우측 상단에 표시
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          SHA=$(echo "${GITHUB_SHA:-local}" | cut -c1-7)
          printf 'window.__BUILD_INFO__ = { date: "%s", version: "%s" };\n' \
            "$DATE" "$SHA" >"$OUT/css-framework-comparison/build-info.js"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
